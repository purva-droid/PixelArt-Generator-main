<html>
    <head>
        <title>Pixel Art Generator</title>
<link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
<link rel="icon" href="favicon.ico" type="image/x-icon">
        <script src="resize.js"></script>
        <script>
		
		
(function(root) {

    /**
     *   The Mask class defines a 2D template form which sprites can be generated.
     *
     *   @class Mask
     *   @constructor
     *   @param {data} Integer array describing which parts of the sprite should be
     *   empty, body, and border. The mask only defines a semi-ridgid stucture
     *   which might not strictly be followed based on randomly generated numbers.
     *
     *      -1 = Always border (black)
     *       0 = Empty
     *       1 = Randomly chosen Empty/Body
     *       2 = Randomly chosen Border/Body
     *
     *   @param {width} Width of the mask data array
     *   @param {height} Height of the mask data array
     *   @param {mirrorX} A boolean describing whether the mask should be mirrored on the x axis
     *   @param {mirrorY} A boolean describing whether the mask should be mirrored on the y axis
     */
    function Mask(data, width, height, mirrorX, mirrorY) {
        this.width   = width;
        this.height  = height;
        this.data    = data;
        this.mirrorX = typeof mirrorX !== 'undefined' ? mirrorX : true;
        this.mirrorY = typeof mirrorY !== 'undefined' ? mirrorY : true;
    }

    /**
    *   The Sprite class makes use of a Mask instance to generate a 2D sprite on a
    *   HTML canvas.
    *
    *   var options = {
    *       coloring         : true,   // boolean
    *       edgeBrightness  : 0.3,    // value from 0 to 1
    *       colorVariations : 0.2,    // value from 0 to 1
    *       brightnessNoise : 0.3,    // value from 0 to 1
    *       saturation      : 0.5     // value from 0 to 1
    *   }
    *
    *   @class Sprite
    *   @param {mask}
    *   @param {options} 
    *   @constructor
    */
    function Sprite(mask, options) {
        this.width     = mask.width * (mask.mirrorX ? 2 : 1);
        this.height    = mask.height * (mask.mirrorY ? 2 : 1);
        this.mask      = mask;
        this.data      = new Array(this.width * this.height);

        this.options = options || {};

        var defaults = {
            coloring         : true,
            edgeBrightness  : 0.3,
            colorVariations : 0.2,
            brightnessNoise : 0.3,
            saturation      : 0.5,
            seed             : null
        };

        // Set default options
        for (var prop in defaults) {
            if (defaults.hasOwnProperty(prop)) {
                var val = this.options[prop];

                // If the option was not provided
                if (typeof val === 'undefined') {
                    val = defaults[prop];
                }

                this.options[prop] = val;
            }
        }
        
        // Seeded random number generator
        this.seededRandom = function() {
            if (this.options.seed === null) return Math.random();
            this.options.seed = (this.options.seed * 9301 + 49297) % 233280;
            return this.options.seed / 233280;
        }.bind(this);

        this.init();
    }


    /**
    *   The init method calls all functions required to generate the sprite.
    *
    *   @method init
    *   @returns {undefined}
    */
    Sprite.prototype.init = function() {
        this.initCanvas();
        this.initContext();
        this.initData();

        this.applyMask();
        this.generateRandomSample();

        if (this.mask.mirrorX) {
            this.mirrorX();
        }

        if (this.mask.mirrorY) {
            this.mirrorY();
        }

        this.generateEdges();
        this.renderPixelData();
    };

    /**
    *   The initCanvas method creates a HTML canvas element for internal use.
    *
    *   (note: the canvas element is not added to the DOM)
    *
    *   @method initCanvas
    *   @returns {undefined}
    */
    Sprite.prototype.initCanvas = function() {
      this.canvas = document.createElement('canvas');
       
      this.canvas.width  = this.width;
      this.canvas.height = this.height;
    };

    /**
    *   The initContext method requests a CanvasRenderingContext2D from the
    *   internal canvas object.
    *
    *   @method 
    *   @returns {undefined}
    */
    Sprite.prototype.initContext = function() {
      this.ctx    = this.canvas.getContext('2d');
      this.pixels = this.ctx.createImageData(this.width, this.height);
    };

    /**
    *   The getData method returns the sprite template data at location (x, y)
    *
    *      -1 = Always border (black)
    *       0 = Empty
    *       1 = Randomly chosen Empty/Body
    *       2 = Randomly chosen Border/Body
    *
    *   @method getData
    *   @param {x}
    *   @param {y}
    *   @returns {undefined}
    */
    Sprite.prototype.getData = function(x, y) {
        return this.data[y * this.width + x];
    };

    /**
    *   The setData method sets the sprite template data at location (x, y)
    *
    *      -1 = Always border (black)
    *       0 = Empty
    *       1 = Randomly chosen Empty/Body
    *       2 = Randomly chosen Border/Body
    *
    *   @method setData
    *   @param {x}
    *   @param {y}
    *   @param {value}
    *   @returns {undefined}
    */
    Sprite.prototype.setData = function(x, y, value) {
        this.data[y * this.width + x] = value;
    };

    /**
    *   The initData method initializes the sprite data to completely solid.
    *
    *   @method initData
    *   @returns {undefined}
    */
    Sprite.prototype.initData = function() {
        var h = this.height;
        var w = this.width;
        var x, y;
        for (y = 0; y < h; y++) {
            for (x = 0; x < w; x++) {
                this.setData(x, y, -1);
            }
        }
    };

    /**
    *   The mirrorX method mirrors the template data horizontally.
    *
    *   @method mirrorX
    *   @returns {undefined}
    */
    Sprite.prototype.mirrorX = function() {
        var h = this.height;
        var w = Math.floor(this.width/2);
        var x, y;
        for (y = 0; y < h; y++) {
            for (x = 0; x < w; x++) {
                this.setData(this.width - x - 1, y, this.getData(x, y));
            }
        }
    };

    /**
    *   The mirrorY method mirrors the template data vertically.
    *
    *   @method 
    *   @returns {undefined}
    */
    Sprite.prototype.mirrorY = function() {
        var h = Math.floor(this.height/2);
        var w = this.width;
        var x, y;
        for (y = 0; y < h; y++) {
            for (x = 0; x < w; x++) {
                this.setData(x, this.height - y - 1, this.getData(x, y));
            }
        }
    };

    /**
    *   The applyMask method copies the mask data into the template data array at
    *   location (0, 0).
    *
    *   (note: the mask may be smaller than the template data array)
    *
    *   @method applyMask
    *   @returns {undefined}
    */
    Sprite.prototype.applyMask = function() {
        var h = this.mask.height;
        var w = this.mask.width;

        var x, y;
        for (y = 0; y < h; y++) {
            for (x = 0; x < w; x++) {
                this.setData(x, y, this.mask.data[y * w + x]);
            }
        }
    };

    /**
    *   Apply a random sample to the sprite template.
    *
    *   If the template contains a 1 (internal body part) at location (x, y), then
    *   there is a 50% chance it will be turned empty. If there is a 2, then there
    *   is a 50% chance it will be turned into a body or border.
    *
    *   (feel free to play with this logic for interesting results)
    *
    *   @method generateRandomSample
    *   @returns {undefined}
    */
    Sprite.prototype.generateRandomSample = function() {
        var h = this.height;
        var w = this.width;

        var x, y;
        for (y = 0; y < h; y++) {
            for (x = 0; x < w; x++) {
                var val = this.getData(x, y);

                if (val === 1) {
                    val = val * Math.round(this.seededRandom());
                } else if (val === 2) {
                    if (this.seededRandom() > 0.5) {
                        val = 1;
                    } else {
                        val = -1;
                    }
                } 

                this.setData(x, y, val);
            }
        }
    };

    /**
    *   This method applies edges to any template location that is positive in
    *   value and is surrounded by empty (0) pixels.
    *
    *   @method generateEdges
    *   @returns {undefined}
    */
    Sprite.prototype.generateEdges = function() {
        var h = this.height;
        var w = this.width;

        var x, y;
        for (y = 0; y < h; y++) {
            for (x = 0; x < w; x++) {
                if (this.getData(x, y) > 0) {
                    if (y - 1 >= 0 && this.getData(x, y-1) === 0) {
                        this.setData(x, y-1, -1);
                    }
                    if (y + 1 < this.height && this.getData(x, y+1) === 0) {
                        this.setData(x, y+1, -1);
                    }
                    if (x - 1 >= 0 && this.getData(x-1, y) === 0) {
                        this.setData(x-1, y, -1);
                    }
                    if (x + 1 < this.width && this.getData(x+1, y) === 0) {
                        this.setData(x+1, y, -1);
                    }
                }
            }
        }
    };

    /**
    *   This method renders out the template data to a HTML canvas to finally
    *   create the sprite.
    *
    *   (note: only template locations with the values of -1 (border) are rendered)
    *
    *   @method renderPixelData
    *   @returns {undefined}
    */
    Sprite.prototype.renderPixelData = function() {
        var isVerticalGradient = this.seededRandom() > 0.5;
        var saturation         = Math.max(Math.min(this.seededRandom() * this.options.saturation, 1), 0);
        var hue                = this.seededRandom();

        var u, v, ulen, vlen;
        if (isVerticalGradient) {
            ulen = this.height;
            vlen = this.width;
        } else {
            ulen = this.width;
            vlen = this.height;
        }

        for (u = 0; u < ulen; u++) {
            // Create a non-uniform random number between 0 and 1 (lower numbers more likely)
            var isNewColor = Math.abs(((this.seededRandom() * 2 - 1) 
                                     + (this.seededRandom() * 2 - 1) 
                                     + (this.seededRandom() * 2 - 1)) / 3);

            // Only change the color sometimes (values above 0.8 are less likely than others)
            if (isNewColor > (1 - this.options.colorVariations)) {
                hue = this.seededRandom();
            }

            for (v = 0; v < vlen; v++) {
                var val, index;
                if (isVerticalGradient) {
                    val   = this.getData(v, u);
                    index = (u * vlen + v) * 4;
                } else {
                    val   = this.getData(u, v);
                    index = (v * ulen + u) * 4;
                }

                var rgb = { r: 1, g: 1, b: 1 };

                if (val !== 0) {
                    if (this.options.coloring) {
                         // Fade brightness away towards the edges
                         var brightness = Math.sin((u / ulen) * Math.PI) * (1 - this.options.brightnessNoise) 
                                        + this.seededRandom() * this.options.brightnessNoise;

                        // Get the RGB color value
                        this.hslToRgb(hue, saturation, brightness, /*out*/ rgb);

                        // If this is an edge, then darken the pixel
                        if (val === -1) {
                            rgb.r *= this.options.edgeBrightness;
                            rgb.g *= this.options.edgeBrightness;
                            rgb.b *= this.options.edgeBrightness;
                        }

                    }  else {
                        // Not coloring, simply output black
                        if (val === -1) {
                            rgb.r = 0;
                            rgb.g = 0;
                            rgb.b = 0;
                        }
                    }
                }

                this.pixels.data[index + 0] = rgb.r * 255;
                this.pixels.data[index + 1] = rgb.g * 255;
                this.pixels.data[index + 2] = rgb.b * 255;
                this.pixels.data[index + 3] = 255;
            }
        }

        this.ctx.putImageData(this.pixels, 0, 0);
    };


    /**
    *   This method converts HSL color values to RGB color values.
    *
    *   @method hslToRgb
    *   @param {h}
    *   @param {s}
    *   @param {l}
    *   @param {result}
    *   @returns {result}
    */
    Sprite.prototype.hslToRgb = function(h, s, l, result) {
        if (typeof result === 'undefined') {
            result = { r: 0, g: 0, b: 0 };
        }

        var i, f, p, q, t;
        i = Math.floor(h * 6);
        f = h * 6 - i;
        p = l * (1 - s);
        q = l * (1 - f * s);
        t = l * (1 - (1 - f) * s);
        
        switch (i % 6) {
            case 0: result.r = l, result.g = t, result.b = p; break;
            case 1: result.r = q, result.g = l, result.b = p; break;
            case 2: result.r = p, result.g = l, result.b = t; break;
            case 3: result.r = p, result.g = q, result.b = l; break;
            case 4: result.r = t, result.g = p, result.b = l; break;
            case 5: result.r = l, result.g = p, result.b = q; break;
        }

        return result;
    };

    /**
    *   This method converts the template data to a string value for debugging
    *   purposes.
    *
    *   @method toString
    *   @returns {undefined}
    */
    Sprite.prototype.toString = function() {
        var h = this.height;
        var w = this.width;
        var x, y, output = '';
        for (y = 0; y < h; y++) {
            for (x = 0; x < w; x++) {
                var val = this.getData(x, y);
                output += val >= 0 ? ' ' + val : '' + val;
            }
            output += '\n';
        }
        return output;
    };

    // Pixel Sprite Generator module
    var psg = {
        version: "v0.0.2",
        Sprite: Sprite,
        Mask: Mask
    };

    // Export psg module
    root.psg = psg;
})(window);

		
		
		</script>

	<body>
		<a href="http://github.com/LAGameStudio/pixel-art-generator" target="_blank">Read instructions &amp; Contribute on github</a>

  <div id = "container">
    <div class = "panel">
      <h1 class ="mainTitle">Pixel Art Generator</h1>

      <h2 class = "chooseTitle">Choose Grid Size and Colors</h2>
      <form id="sizePicker">
        <span class = "label">Rows: </span>
        <input type="number" required id="input_height" name="height" min="1" max="50" value="16">
        <span class = "label">Columns: </span>
        <input type="number" required id="input_width" name="width" min="1" max="50" value="16">
        <input type="submit" value="Set Size &darr;">
      </form>
<hr>
<p>
 <input type="checkbox" id="mirrorX"> Mirror X - <input type="checkbox" id="mirrorY"> Mirror Y - <input type="checkbox" id="colorized"> Grayscale
 </p>

<div style="max-width: 700px; margin: 24px auto; text-align: left;">
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
    <div>
      <label style="display: block; margin-bottom: 6px; font-weight: 500; color: #cbd5e1;">
        Edge Brightness: <span id="edgeBrightnessVal" style="color: #f97316;">0.3</span>
      </label>
      <input type="range" id="edgeBrightness" min="0" max="1" step="0.05" value="0.3" style="width: 100%;">
    </div>
    <div>
      <label style="display: block; margin-bottom: 6px; font-weight: 500; color: #cbd5e1;">
        Color Variations: <span id="colorVariationsVal" style="color: #f97316;">0.2</span>
      </label>
      <input type="range" id="colorVariations" min="0" max="1" step="0.05" value="0.2" style="width: 100%;">
    </div>
    <div>
      <label style="display: block; margin-bottom: 6px; font-weight: 500; color: #cbd5e1;">
        Brightness Noise: <span id="brightnessNoiseVal" style="color: #f97316;">0.3</span>
      </label>
      <input type="range" id="brightnessNoise" min="0" max="1" step="0.05" value="0.3" style="width: 100%;">
    </div>
    <div>
      <label style="display: block; margin-bottom: 6px; font-weight: 500; color: #cbd5e1;">
        Saturation: <span id="saturationVal" style="color: #f97316;">0.5</span>
      </label>
      <input type="range" id="saturation" min="0" max="1" step="0.05" value="0.5" style="width: 100%;">
    </div>
    <div>
      <label style="display: block; margin-bottom: 6px; font-weight: 500; color: #cbd5e1;">
        Sprite Count: <span id="spriteCountVal" style="color: #f97316;">10</span>
      </label>
      <input type="range" id="spriteCount" min="1" max="50" value="10" style="width: 100%;">
    </div>
    <div>
      <label style="display: block; margin-bottom: 6px; font-weight: 500; color: #cbd5e1;">
        Scale: <span id="spriteScaleVal" style="color: #f97316;">2</span>x
      </label>
      <input type="range" id="spriteScale" min="1" max="8" value="2" style="width: 100%;">
    </div>
  </div>
  <div style="margin-top: 20px;">
    <label style="display: block; margin-bottom: 6px; font-weight: 500; color: #cbd5e1;">
      Seed (reproducible generation):
    </label>
    <input type="number" id="generationSeed" placeholder="Leave empty for random" style="width: 100%; max-width: 220px;">
  </div>
</div>

       <p>
          <label>Tools and brushes:</label>            
          <input type = "radio" name = "brush" id = "brush1" value = "-1"  checked = "checked" />
          <label for = "brush1">border -1 (1)</label>
          <input type = "radio" name = "brush" id = "brush2" value = "0" />
          <label for = "brush2">empty 0 (2)</label>
          <input type = "radio" name = "brush" id = "brush3"  value = "1" />
		  <label for = "brush3">body/empty 1 (3)</label>
          <input type = "radio" name = "brush" id = "brush4" value = "2" />
          <label for = "brush4">body/border 2 (4)</label>
        </p>

        <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin: 20px 0;">
          <button id="clearMask" style="background: linear-gradient(135deg, #64748b, #475569);">🗑 Clear</button>
          <button id="fillMask" style="background: linear-gradient(135deg, #64748b, #475569);">🪣 Fill</button>
          <button id="undoBtn" style="background: linear-gradient(135deg, #6366f1, #4f46e5);">↶ Undo</button>
          <button id="redoBtn" style="background: linear-gradient(135deg, #6366f1, #4f46e5);">↷ Redo</button>
          <button id="saveMask" style="background: linear-gradient(135deg, #10b981, #059669);">💾 Save</button>
          <button id="loadMaskBtn" style="background: linear-gradient(135deg, #8b5cf6, #7c3aed);">📂 Load</button>
          <input type="file" id="loadMask" accept=".json" style="display:none">
        </div>

    </div>
    <table id="pixel_canvas"></table>
	  <button id="generate">Generate &darr;</button>
    <button id="clearGenerations">Clear All Generations</button>
  </div>
  
  <script async charset="utf-8">
  /* jshint esnext: true */
/* global document */
let canvas = document.getElementById("pixel_canvas");
let height = document.getElementById("input_height");
let width = document.getElementById("input_width");

let mirroring_x = false;
let mirror_x = document.getElementById("mirrorX");
mirror_x.onclick = function (e) { mirroring_x = !mirroring_x; };
let mirroring_y = false;
let mirror_y = document.getElementById("mirrorY");
mirror_y.onclick = function (e) { mirroring_y = !mirroring_y; };

let not_grayscale = true;
let not_grayscale_tick = document.getElementById("colorized");
colorized.onclick = function (e) { not_grayscale = !not_grayscale; };

// Parameter sliders
let edgeBrightness = document.getElementById("edgeBrightness");
let colorVariations = document.getElementById("colorVariations");
let brightnessNoise = document.getElementById("brightnessNoise");
let saturation = document.getElementById("saturation");
let spriteCount = document.getElementById("spriteCount");
let spriteScale = document.getElementById("spriteScale");
let generationSeed = document.getElementById("generationSeed");

// Slider value displays
function updateSliderValue(id, val) {
  document.getElementById(id + 'Val').textContent = val;
}
edgeBrightness.oninput = e => updateSliderValue('edgeBrightness', e.target.value);
colorVariations.oninput = e => updateSliderValue('colorVariations', e.target.value);
brightnessNoise.oninput = e => updateSliderValue('brightnessNoise', e.target.value);
saturation.oninput = e => updateSliderValue('saturation', e.target.value);
spriteCount.oninput = e => updateSliderValue('spriteCount', e.target.value);
spriteScale.oninput = e => updateSliderValue('spriteScale', e.target.value);

let sizePicker = document.getElementById("sizePicker");
sizePicker.onsubmit = function(event) { event.preventDefault(); clearGrid(); makeGrid(); saveState(); };

let brush1 = document.getElementById("brush1");
let brush2 = document.getElementById("brush2");
let brush3 = document.getElementById("brush3");
let brush4 = document.getElementById("brush4");

brush1.onclick = function(event) { ink =  -1 ; }
brush2.onclick = function(event) { ink =   0 ; }
brush3.onclick = function(event) { ink =   1 ; }
brush4.onclick = function(event) { ink =   2 ; }

let genButton = document.getElementById("generate");
genButton.onclick = function(event) { generateSprites(); };

// New features
document.getElementById("clearMask").onclick = clearMask;
document.getElementById("fillMask").onclick = fillMask;
document.getElementById("undoBtn").onclick = undo;
document.getElementById("redoBtn").onclick = redo;
document.getElementById("saveMask").onclick = saveMask;
document.getElementById("loadMaskBtn").onclick = () => document.getElementById("loadMask").click();
document.getElementById("loadMask").onchange = loadMask;
document.getElementById("clearGenerations").onclick = clearGenerations;

// Undo/Redo
let history = [];
let historyIndex = -1;
const MAX_HISTORY = 50;

function saveState() {
  history = history.slice(0, historyIndex + 1);
  history.push({
    spriteValue: [...spriteValue],
    spriteWidth,
    spriteHeight
  });
  if (history.length > MAX_HISTORY) history.shift();
  else historyIndex++;
  updateUndoRedoButtons();
}

function undo() {
  if (historyIndex > 0) {
    historyIndex--;
    restoreState(history[historyIndex]);
  }
  updateUndoRedoButtons();
}

function redo() {
  if (historyIndex < history.length - 1) {
    historyIndex++;
    restoreState(history[historyIndex]);
  }
  updateUndoRedoButtons();
}

function restoreState(state) {
  width.value = state.spriteWidth;
  height.value = state.spriteHeight;
  clearGrid();
  makeGrid();
  spriteValue = [...state.spriteValue];
  redrawGrid();
}

function updateUndoRedoButtons() {
  document.getElementById("undoBtn").disabled = historyIndex <= 0;
  document.getElementById("redoBtn").disabled = historyIndex >= history.length - 1;
}

function clearMask() {
  saveState();
  spriteValue.fill(0);
  redrawGrid();
}

function fillMask() {
  saveState();
  spriteValue.fill(1);
  redrawGrid();
}

function redrawGrid() {
  for (let r = 0; r < spriteHeight; r++) {
    for (let c = 0; c < spriteWidth; c++) {
      const cell = canvas.rows[r].cells[c];
      const val = spriteValue[c + r * spriteWidth];
      cell.style.backgroundColor = getColorForValue(val);
    }
  }
}

function getColorForValue(val) {
  switch (val) {
    case -1: return "#000000";
    case 0: return "#FFFFFF";
    case 1: return "#AAAAAA";
    case 2: return "#777777";
    default: return "#FFFFFF";
  }
}

function saveMask() {
  const maskData = {
    version: psg.version,
    width: spriteWidth,
    height: spriteHeight,
    mirrorX: mirroring_x,
    mirrorY: mirroring_y,
    data: spriteValue
  };
  const blob = new Blob([JSON.stringify(maskData, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'pixel-mask.json';
  a.click();
  URL.revokeObjectURL(url);
}

function loadMask(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(event) {
    try {
      const mask = JSON.parse(event.target.result);
      width.value = mask.width;
      height.value = mask.height;
      mirroring_x = mask.mirrorX;
      mirroring_y = mask.mirrorY;
      mirror_x.checked = mask.mirrorX;
      mirror_y.checked = mask.mirrorY;
      clearGrid();
      makeGrid();
      spriteValue = mask.data;
      redrawGrid();
      saveState();
    } catch (err) {
      alert('Invalid mask file');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function clearGenerations() {
  document.querySelectorAll('div[id^="0"], div[id^="1"], div[id^="2"], div[id^="3"], div[id^="4"], div[id^="5"], div[id^="6"], div[id^="7"], div[id^="8"], div[id^="9"]').forEach(el => el.remove());
  lastFragment = null;
  counter = 0;
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  switch(e.key) {
    case '1': brush1.click(); break;
    case '2': brush2.click(); break;
    case '3': brush3.click(); break;
    case '4': brush4.click(); break;
    case 'z': if (!e.ctrlKey && !e.metaKey) undo(); break;
    case 'y': if (!e.ctrlKey && !e.metaKey) redo(); break;
  }
});

setTimeout(function() { clearGrid(); makeGrid(); saveState(); }, 100);

function makeGrid() {
    spriteWidth = parseInt(width.value);
    spriteHeight = parseInt(height.value);
    spriteValue = new Array(spriteHeight * spriteWidth).fill(0);
    for (let r=0; r<spriteHeight; r++){
        const row = canvas.insertRow(r);
        for (let c=0; c<spriteWidth; c++){
            var cell = row.insertCell(c);		
            cell.addEventListener("mouseover", mouseOverCell);
            cell.addEventListener("click", mouseClickCell);
            cell.addEventListener("mousedown", mouseClickCell);
			cell.x=c;
			cell.y=r;
			spriteValue[c + r * spriteWidth] = 0;
            cell.style.backgroundColor = "#FFFFFF";
        }
    }
}

function clearGrid(){ while (canvas.firstChild) { canvas.removeChild(canvas.firstChild); spriteWidth=0; spriteHeight=0; spriteValue = []; } }

let spriteWidth=0,spriteHeight=0;
let spriteValue = [];

let ink = -1;
let isDrawing = false;

document.addEventListener('mousedown', () => isDrawing = true);
document.addEventListener('mouseup', () => isDrawing = false);
	 
function mouseOverCell(e) {
    if(isDrawing){
        drawCell(this);
    }
}
	  
function mouseClickCell(e) {
    saveState();
    drawCell(this);
}

function drawCell(cell) {
    var color = getColorForValue(ink);
    spriteValue[cell.x + cell.y * spriteWidth] = ink;
    cell.style.backgroundColor = color;
}


let lastFragment = null;
let counter = 0;
		
function insertBefore(newNode, referenceNode) { referenceNode.parentNode.insertBefore(newNode, referenceNode); }
function generateSprites() {
    var SPRITE_SCALE = parseInt(spriteScale.value);
    var SPRITE_COUNT = parseInt(spriteCount.value);
    var seed = generationSeed.value ? parseInt(generationSeed.value) : null;

    var spaceship = new psg.Mask(spriteValue, spriteWidth, spriteHeight, mirroring_x, mirroring_y );

    var fragment = document.createDocumentFragment();

    var i, sprite, div, deleteBtn;

    // Output
    div = document.createElement('div');
    div.id = counter;
    div.style.position = 'relative';
    
    deleteBtn = document.createElement('button');
    deleteBtn.textContent = '✕ Delete';
    deleteBtn.style.position = 'absolute';
    deleteBtn.style.right = '10px';
    deleteBtn.style.top = '10px';
    deleteBtn.onclick = function() {
        document.getElementById(counter).remove();
    };
    
    const header = document.createElement('span');
    header.innerText = 'Generation '+counter;
    div.appendChild(header);
    div.appendChild(deleteBtn);
    div.appendChild(document.createElement('hr'));
    
    for (i = 0; i < SPRITE_COUNT; i++) {
        let spriteSeed = seed !== null ? seed + i : null;
        sprite = new psg.Sprite(spaceship, {
            coloring         : not_grayscale,
            edgeBrightness   : parseFloat(edgeBrightness.value),
            colorVariations  : parseFloat(colorVariations.value),
            brightnessNoise  : parseFloat(brightnessNoise.value),
            saturation       : parseFloat(saturation.value),
            seed             : spriteSeed
        });
        
        const scaledCanvas = resize(sprite.canvas, SPRITE_SCALE);
        scaledCanvas.title = 'Right click to save image';
        scaledCanvas.style.cursor = 'pointer';
        scaledCanvas.onclick = function() {
            const a = document.createElement('a');
            a.download = `sprite-${counter}-${i}.png`;
            a.href = this.toDataURL();
            a.click();
        };
        
        div.appendChild(scaledCanvas);
    }

    fragment.appendChild(div);

    if ( lastFragment == null ) {
        document.body.appendChild(fragment);
    } else {
        insertBefore(fragment, lastFragment);			
    }
    lastFragment = document.getElementById(""+counter);
    counter++;
}
        </script>
    </body>
</html>
